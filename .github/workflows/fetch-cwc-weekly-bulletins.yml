name: Fetch CWC Weekly Bulletins

on:
  schedule:
    - cron: "30 1 */2 * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-cwc-weekly-bulletins
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas pdfplumber selenium

      - name: Download latest CWC bulletin
        run: python current_day_reservoir_snapshot.py --download-latest

      - name: Commit new bulletins
        run: |
          if [ -z "$(git status --porcelain -- weekly_bulletins)" ]; then
            echo "No new or changed CWC bulletins."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add weekly_bulletins

          if git diff --cached --quiet; then
            echo "No staged CWC bulletin changes."
            exit 0
          fi

          git commit -m "Update CWC weekly bulletins"
          git push origin HEAD:main
