name: Daily Water Situation SQLite Ingestion

on:
  schedule:
    - cron: "0 5 * * *"
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pdfplumber

      - name: Ingest Daily Water Situation PDF
        run: python res_storages/daily_water_situation_db.py

      - name: Commit SQLite and historical PDF updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/daily_water_situation.sqlite "res_storages/Historical Daily Storages"
          if git diff --cached --quiet; then
            echo "No Daily Water Situation changes to commit."
          else
            git commit -m "Update daily water situation SQLite data"
            git push
          fi
